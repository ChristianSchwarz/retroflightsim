<!doctype html>
<html>
<head><meta charset="utf-8"><title>FM2 wing CL / CD vs AoA</title>
<style>body{margin:0;background:#111;color:#ddd;font:13px system-ui}canvas{display:block;margin:16px auto}</style>
</head>
<body>
<canvas id="c" width="860" height="500"></canvas>
<script>
const DEG = Math.PI/180;
// --- exact port of aeroSurface.ts ---
const FLAT_PLATE_CL = 1.1;
const LIFT_SEPARATION_STEEPNESS = 8;
const CL_SOFTCLIP_EXPONENT = 4;
function liftCoefficient(a, slope, stall, vortex=0, alpha0=0, clMaxOverride=undefined){
  const mag=Math.abs(a), sign=Math.sign(a)||1;
  const clMax = clMaxOverride ?? slope*stall;
  const linear = slope*(a-alpha0);
  const norm = Math.abs(linear)/clMax;
  const attached = linear/Math.pow(1+Math.pow(norm, CL_SOFTCLIP_EXPONENT), 1/CL_SOFTCLIP_EXPONENT);
  const flat = FLAT_PLATE_CL*Math.sin(2*a);
  const sep = 1/(1+Math.exp(-LIFT_SEPARATION_STEEPNESS*(mag-stall)));
  let cl = (1-sep)*attached + sep*flat;
  if(vortex>0){
    const vp=50*DEG, ve=90*DEG;
    if(mag>stall && mag<ve){
      const half = mag<=vp ? (mag-stall)/(vp-stall) : (ve-mag)/(ve-vp);
      const window = 0.5*(1-Math.cos(Math.PI*Math.max(0, Math.min(1, half))));
      cl += sign*window*clMax*vortex;
    }
  }
  return cl;
}
function dragCoefficient(a, cl, cd0, k, stall, fpc=2.0){
  const attached = cd0 + k*cl*cl;
  const flat = fpc*0.5*(1-Math.cos(2*a));
  const sep = 1/(1+Math.exp(-15*(Math.abs(a)-stall)));
  return (1-sep)*attached + sep*flat;
}
// --- surface presets (fm2Constants.ts FM2_SURFACES) ---
const SURFACES={
  wing:     {label:'Wing panel',  slope:5.2, stall:24*DEG, vortex:0,    alpha0:-1.3*DEG, clMax:1.5, cd0:0.0085, k:0.118, fpc:1.9},
  fuselage: {label:'Fuselage',    slope:2.4, stall:40*DEG, vortex:0.55, alpha0:-1.9*DEG, clMax:1.5, cd0:0.0,    k:0.25,  fpc:1.3},
  aileron:  {label:'Aileron',     slope:4.5, stall:28*DEG, vortex:0,    alpha0:0,        clMax:1.5, cd0:0.009,  k:0.15,  fpc:1.9},
  htail:    {label:'Horiz. tail', slope:3.4, stall:26*DEG, vortex:0,    alpha0:0,        clMax:undefined, cd0:0.006, k:0.15, fpc:2.0},
};
let current='wing';

const cv=document.getElementById('c'), g=cv.getContext('2d');
const M={l:60,r:64,t:44,b:48}, W2=cv.width-M.l-M.r, H2=cv.height-M.t-M.b;
const AX={min:-180,max:180}, CL={min:-2.4,max:2.4}, CD={min:0,max:2.0};
const X = a => M.l + (a-AX.min)/(AX.max-AX.min)*W2;
const YL = v => M.t + (CL.max-v)/(CL.max-CL.min)*H2;
const YR = v => M.t + (CD.max-v)/(CD.max-CD.min)*H2;

function draw(){
  const W=SURFACES[current];
  g.fillStyle='#111'; g.fillRect(0,0,cv.width,cv.height);
  g.strokeStyle='#333'; g.fillStyle='#aaa'; g.textAlign='center'; g.font='13px system-ui';
  for(let a=AX.min;a<=AX.max;a+=45){ g.beginPath();g.moveTo(X(a),M.t);g.lineTo(X(a),M.t+H2);g.stroke(); g.fillText(a+'\u00b0',X(a),M.t+H2+18); }
  g.fillText('Angle of attack (deg)', M.l+W2/2, cv.height-8);
  g.textAlign='right'; g.fillStyle='#6cf';
  for(let v=CL.min;v<=CL.max+1e-9;v+=0.4){ g.fillText(v.toFixed(1),M.l-8,YL(v)+4); }
  g.textAlign='left'; g.fillStyle='#f77';
  for(let v=CD.min;v<=CD.max+1e-9;v+=0.4){ g.fillText(v.toFixed(1),M.l+W2+8,YR(v)+4); }
  g.strokeStyle='#555'; g.beginPath();g.moveTo(M.l,YL(0));g.lineTo(M.l+W2,YL(0));g.stroke();
  const stallDeg=W.stall/DEG;
  g.strokeStyle='#777'; g.setLineDash([4,4]);
  for(const s of [stallDeg,-stallDeg]){ g.beginPath();g.moveTo(X(s),M.t);g.lineTo(X(s),M.t+H2);g.stroke(); }
  g.setLineDash([]);
  g.fillStyle='#999'; g.textAlign='left'; g.fillText('\u00b1stall '+stallDeg.toFixed(0)+'\u00b0', X(stallDeg)+4, M.t+14);

  const plot=(color,yfn,valfn)=>{
    g.strokeStyle=color; g.lineWidth=2; g.beginPath(); let started=false;
    for(let d=AX.min; d<=AX.max; d+=0.25){
      const a=d*DEG, cl=liftCoefficient(a,W.slope,W.stall,W.vortex,W.alpha0,W.clMax);
      const y=yfn(valfn(a,cl)); const x=X(d);
      if(!started){g.moveTo(x,y);started=true;}else g.lineTo(x,y);
    }
    g.stroke();
  };
  plot('#6cf', YL, (a,cl)=>cl);
  plot('#f77', YR, (a,cl)=>dragCoefficient(a,cl,W.cd0,W.k,W.stall,W.fpc));

  g.lineWidth=2; g.textAlign='left';
  g.strokeStyle='#6cf'; g.beginPath();g.moveTo(M.l+12,M.t+10);g.lineTo(M.l+40,M.t+10);g.stroke();
  g.fillStyle='#6cf'; g.fillText('C_L (left axis)', M.l+46, M.t+14);
  g.strokeStyle='#f77'; g.beginPath();g.moveTo(M.l+170,M.t+10);g.lineTo(M.l+198,M.t+10);g.stroke();
  g.fillStyle='#f77'; g.fillText('C_D (right axis)', M.l+204, M.t+14);
  g.fillStyle='#eee'; g.textAlign='center'; g.font='15px system-ui';
  g.fillText('FM2 '+W.label+' \u2014 C_L and C_D vs AoA', M.l+W2/2, 22);
}
draw();

// simple surface selector
const bar=document.createElement('div'); bar.style.textAlign='center';
Object.keys(SURFACES).forEach(k=>{
  const b=document.createElement('button'); b.textContent=SURFACES[k].label;
  b.style.cssText='margin:4px;padding:6px 12px;background:#222;color:#ddd;border:1px solid #444;border-radius:5px;cursor:pointer';
  b.onclick=()=>{current=k; draw();};
  bar.appendChild(b);
});
document.body.appendChild(bar);
</script>
</body>
</html>
